name: Metrics
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
  push: { branches: ["master", "main"] }
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.NAIROLF32_METRICS }}
          config_timezone: Africa/Porto-Novo
          template: markdown
          markdown: >-
            template.md
          filename: README.md
          config_output: markdown
          markdown_cache: .cache
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          extras_css: |
            .field.warning { display: none; }
            /* Hide Irrelevent warnings (temporary fix) */

          plugin_languages: yes
          plugin_languages_details: bytes-size, percentages
          plugin_languages_indepth: yes

          plugin_anilist: yes
          plugin_anilist_user: nairolf32
          plugin_anilist_sections: characters

          plugin_music: yes
          plugin_music_token: ${{ secrets.LASTFM_SECRET }}
          plugin_music_provider: lastfm
          plugin_music_user: nairolf32

          plugin_notable: yes
          plugin_notable_indepth: yes

          plugin_achievements: yes

          plugin_stackoverflow: yes
          plugin_stackoverflow_user: 14132197

